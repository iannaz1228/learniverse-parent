name: learniverse_parent
description: "LearniVerse parent app — monitor progress, control screen time, manage rewards."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^14.8.1

  # Backend — Supabase (auth, database, realtime)
  supabase_flutter: ^2.9.0

  # Utilities
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app-logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3B0764"
  adaptive_icon_foreground: "assets/images/app-logo.png"
  adaptive_icon_round: false
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icons/
